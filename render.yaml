services:
  - type: web
    name: evropuvefur-api
    runtime: python
    plan: starter
    buildCommand: cd admin && npm ci && npm run build && cd .. && pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: evropuvefur-db
          property: connectionString
      - key: DEEPINFRA_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CMS_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://www.evropuvefur.is,https://evropuvefur.is

databases:
  - name: evropuvefur-db
    plan: basic-256mb
    databaseName: evropuvefur
    postgresMajorVersion: "15"
